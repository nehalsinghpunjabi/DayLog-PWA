<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta name="theme-color" content="#4438ca" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DayLog">
  <meta name="description" content="DayLog 2.0 — iPhone-first daily log with cloud sync, infinite history, and global search.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <title>DayLog</title>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <div class="boot"><i class="spinner big"></i></div>
  </div>

  <input id="photo-input" type="file" accept="image/*" multiple hidden>
  <input id="camera-input" type="file" accept="image/*" capture="environment" hidden>

  <!-- Runtime config (git-ignored). Copy js/config.example.js -> js/config.js. -->
  <script src="js/config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
