# Supabase CLI project config for DayLog 2.0.
# `supabase link` fills in project_id for your own project.
project_id = "daylog"

# Business-card OCR + Grok extraction. Requires OCR_SPACE_API_KEY and
# (optionally) GROK_API_KEY set via `supabase secrets set`. JWT-verified so only
# authenticated users can call it.
[functions.business-card-process]
verify_jwt = true
