# Supabase CLI project config for DayLog 2.0.
# `supabase link` fills in project_id for your own project.
project_id = "daylog"

# Business-card OCR + Groq extraction. Secrets via `supabase secrets set`:
#   OCR_SPACE_API_KEY (required), GROQ_API_KEY (optional),
#   GROQ_MODEL (optional, default llama-3.3-70b-versatile).
# JWT-verified so only authenticated users can call it.
[functions.business-card-process]
verify_jwt = true
